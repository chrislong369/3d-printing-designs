name: Build 3D Catalog

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  build-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build catalog
        run: |
          python scripts/build_3d_catalog.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/3d-catalog.* || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update 3D catalog"
            git push
          fi
